name: Release with Maven Release Plugin
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no commits, no deploy)"
        required: true
        default: "true"
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      - name: Release
        run: |
          mvn --batch-mode \
            -DdryRun=${{ github.event.inputs.dry_run }} \
            -Darguments="-DskipTests" \
            release:prepare release:perform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
      - name: Create GitHub Release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/checkout/*.jar
            !target/checkout/*-sources.jar
            !target/checkout/*-javadoc.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}